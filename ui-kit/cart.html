<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css" media="all">

/* ========================================
   DRAWER
======================================== */

.cart-drawer{

  position:fixed;

  top:0;

  right:0;

  width:480px;

  height:100vh;

  background:var(--color-surface);

  box-shadow:var(--shadow-lg);

  z-index:9999;

  display:flex;

  flex-direction:column;

}

/* ========================================
   HEADER
======================================== */

.cart-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:var(--space-5);

  border-bottom:1px solid var(--color-border);

}

.cart-title{
  color:var(--color-text-primary);
}
.cart-item__title , .cart-title{
    font-family: var(--font-heading-en);
}
.cart-close{

  border:none;

  background:none;

  cursor:pointer;

  font-size:24px;

}

/* ========================================
   BODY
======================================== */

.cart-body{

  flex:1;

  overflow-y:auto;

  padding:var(--space-4);

}

/* ========================================
   ITEM
======================================== */

.cart-item{

  display:grid;

  grid-template-columns:
  72px
  1fr
  auto;

  gap:var(--space-3);

  padding:var(--space-3);

  border:1px solid var(--color-border);

  border-radius:var(--radius-sm);

  background:var(--color-surface);

  margin-bottom:var(--space-3);

}

/* ========================================
   IMAGE
======================================== */
.cart-item__image {
  
  width: 80px;
  
  aspect-ratio: 4/5;
  
  object-fit: cover;
  
}

/* ========================================
   CONTENT
======================================== */

.cart-item__content{

  display:flex;

  flex-direction:column;

  gap:var(--space-1);

}

.cart-item__title{

  font-size:16px;

  font-weight:600;

  color:var(--color-text-primary);

}

.cart-item__category{

  font-size:14px;

  color:var(--color-text-secondary);

}

.cart-item__price{

  font-weight:700;

  color:var(--color-mauve-deep);

}

/* ========================================
   ACTIONS
======================================== */

.cart-item__actions{

  display:flex;

  flex-direction:column;

  justify-content:space-between;

  align-items:flex-end;

}

/* ========================================
   QUANTITY
======================================== */

.cart-qty{

  display:flex;

  align-items:center;

  gap:var(--space-2);

}

.cart-qty button{

  width:32px;

  height:32px;

  border:none;

  border-radius:var(--radius-sm);

  background:var(--color-mauve-dusty);

  color:#fff;

  cursor:pointer;

}

/* ========================================
   REMOVE
======================================== */

.cart-remove{

  border:none;

  background:none;

  color:#D64545;

  cursor:pointer;

}

/* ========================================
   FOOTER
======================================== */

.cart-footer{

  padding:var(--space-5);

  border-top:1px solid var(--color-border);

}

.cart-total{

  display:flex;

  justify-content:space-between;

  margin-bottom:var(--space-4);

}

.cart-checkout{

  width:100%;

  height:48px;

  border:none;

  border-radius:var(--radius-sm);

  background:var(--color-mauve-dusty);

  color:#fff;

  font-weight:600;

  cursor:pointer;

  transition:var(--transition-normal);

}

.cart-checkout:hover{

  background:var(--color-mauve-deep);

}

/* ========================================
   MOBILE
======================================== */

@media(max-width:768px){

  .cart-drawer{

    width:90%;

  }

}
  </style>
</head>

<body>
