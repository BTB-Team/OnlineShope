<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="../src/css/style.css">

</head>
<body>
  <!-- ===========    CART DRAWER========== -->
<div class="cart-overlay"></div>
<aside class="cart-drawer">
  <!-- Header -->
  <div class="cart-header">
    <h2 class="cart-title"> Your Cart</h2>
    <button  class="cart-close"  aria-label="Close Cart">✕</button>
  </div>
  <!-- Body -->
  <div class="cart-body">
    <!-- Item -->
    <div class="cart-item">
      <img  class="cart-item__image"  src="./images/white-high.jpg"  alt="Formal Leather Shoes">
      <div class="cart-item__content">
        <h3 class="cart-item__title"> Formal Leather Shoes</h3>
        <p class="cart-item__category"> Women's Shoes</p>
        <span class="cart-item__price number "> $96</span>
      </div>
      <div class="cart-item__actions">
        <div class="cart-qty">
          <button class="number">-</button>
          <span class="number" class="number">1</span>
          <button>+</button>
        </div>
        <button class="cart-remove"> Remove</button>
      </div>
    </div>
    <!-- Item -->
    <div class="cart-item">
      <img class="cart-item__image" src="./images/goshwara-2.jpg" alt="Leather Handbag"/>
      <div class="cart-item__content">
        <h3 class="cart-item__title">Leather Handbag</h3>
        <p class="cart-item__category">Accessories</p>
        <span class="cart-item__price number">$120</span>
      </div>
      <div class="cart-item__actions">
        <div class="cart-qty">
          <button class="number">-</button>
          <span class="number">2</span>
          <button class="number">+</button>
        </div>
        <button class="cart-remove">Remove</button>
      </div>
    </div>
  </div>
  <!-- Footer -->
  <div class="cart-footer">
    <div class="cart-total">
      <span class="number" >Subtotal</span>
      <span class="number" class="number">
      <strong >$336</strong>
    </div>
    <button class="cart-checkout">
      Checkout via WhatsApp
    </button>
  </div>
</aside>
</body>

</html>
