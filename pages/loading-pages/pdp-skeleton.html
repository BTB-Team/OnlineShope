<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product details page</title>
    <link rel="stylesheet" href="../../src/css/style.css">
    <link rel="stylesheet" href="../../src/css/pages/pdp.css">
</head>
<body>
    <h1>PDP loading skeleton</h1>
    <section class="pdp-skeleton">
        <!-- Media -->
        <section class="pdp-skeleton-media-wrapper">
        <div class="pdp-skeleton__media">
          <div class="pdp-skeleton__thumbnails">
            <div class="skeleton skeleton-thumb"></div>
            <div class="skeleton skeleton-thumb"></div>
            <div class="skeleton skeleton-thumb"></div>
            <div class="skeleton skeleton-thumb"></div>
          </div>
          <div class="skeleton skeleton-main-image"></div>
        </div>
        <!-- Product Info -->
        <div class="pdp-skeleton__content">
          <div class="skeleton skeleton-collection"></div>
          <div class="skeleton skeleton-product-title"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text short"></div>
          <div class="skeleton skeleton-price"></div>
          <div class="skeleton skeleton-cart-button"></div>
        </div>
        </section>
        <!-- Description -->
        <section class="pdp-description-skeleton">
          <div class="skeleton skeleton-section-title"></div>
          <div class="skeleton skeleton-paragraph"></div>
          <div class="skeleton skeleton-paragraph"></div>
          <div class="skeleton skeleton-paragraph short"></div>
        </section>
        <!-- Specifications -->
        <section class="pdp-specs-skeleton">
            <div class="skeleton skeleton-section-title"></div>
            <div class="skeleton skeleton-spec-row"></div>
            <div class="skeleton skeleton-spec-row"></div>
            <div class="skeleton skeleton-spec-row"></div>
            <div class="skeleton skeleton-spec-row"></div>  
        </section>
    </section>
</body>
</html>
