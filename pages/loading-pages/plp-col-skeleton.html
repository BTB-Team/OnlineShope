<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css" media="all">
    /* ========================================
   DESIGN TOKENS
======================================== */

:root {
  
  /* COLORS */
  
  --color-mauve-pale: #F6F0F4;
  --color-mauve-pink: #C9A3B9;
  --color-mauve-dusty: #A77A95;
  --color-mauve-deep: #6F4E63;
  
  --color-background: #FCFAFB;
  --color-surface: #FFFFFF;
  
  --color-text-primary: #2D2430;
  --color-text-secondary: #5F5663;
  --color-text-muted: #8A838E;
  
  --color-border: #E7DFE4;
  
  /* SPACING */
  
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;
  
  /* TYPOGRAPHY */
  
  --font-size-xs: 12px;
  --font-size-sm: 14px;
  --font-size-md: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 24px;
  --font-size-2xl: 32px;
  
  /* RADIUS */
  
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 12px;
  
  /* SHADOWS */
  
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, .06);
  --shadow-md: 0 8px 20px rgba(0, 0, 0, .08);
  --shadow-lg: 0 16px 40px rgba(0, 0, 0, .10);
  
  /* LAYOUT */
  
  --container-max-width: 1440px;
  
  --section-spacing: 64px;
  
  /* PDP */
  
  --thumbnail-width: 80px;
  --thumbnail-height: 100px;
  
  --product-media-ratio: 4/5;
  /* UTILITIES */
  --swatch-size: 20px;
  --pill-radius: 999px;
  --spec-table-label-width: 30%;
  --transition-normal: 250ms;
/* skeleton tokens*/
  --skeleton-base: var(--color-border);
  --skeleton-highlight: var(--color-mauve-pale);
  --button-height: 44px;
  --skeleton-label-width: 120px;
  --skeleton-price-width: 140px;
  --skeleton-spec-height: 48px;

}

/* ========================================
   RESET
======================================== */
a,
button {
  -webkit-tap-highlight-color: transparent;
}
a:focus,
button:focus {
  outline: none;
}
a:focus-visible,
button:focus-visible {
  outline: 2px solid var(--color-mauve-dusty);
  outline-offset: 4px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  min-height:100vh;

  /*display:flex;
  justify-content:center;
  align-items:center;*/

  padding:24px;

  background:var(--color-background);

  font-family:sans-serif;

}
a{
  text-decoration:none;
}

.container{
  margin-top: var(--space-6);
  margin-bottom: var(--space-6);
}


/* ========================================
   BASE
======================================== */

.skeleton{

  background:linear-gradient(
    90deg,
    var(--skeleton-base) 25%,
    var(--skeleton-highlight) 50%,
    var(--skeleton-base) 75%
  );

  background-size:200% 100%;

  animation:skeleton-loading 3.4s infinite;

}

@keyframes skeleton-loading{

  0%{
    background-position:200% 0;
  }

  100%{
    background-position:-200% 0;
  }

}
/* ========================================
   HERO SKELETON
======================================== */

.hero-skeleton {
  
  position: relative;
  
  overflow: hidden;
  
  border-radius: var(--radius-md);
  
  margin-bottom: var(--space-8);
  
}

/* ========================================
   IMAGE
======================================== */

.hero-skeleton__image {
  
  width: 100%;
  
  aspect-ratio: 16/6;
  
  border-radius: var(--radius-md);
  
}

/* ========================================
   CONTENT
======================================== */

.hero-skeleton__content {
  
  position: absolute;
  
  left: var(--space-6);
  
  bottom: var(--space-6);
  
  width: min(420px, 80%);
  
}

.hero-skeleton__subtitle {
  
  width: 120px;
  
  height: var(--space-4);
  
  border-radius: var(--radius-sm);
  
  margin-bottom: var(--space-3);
  
}

.hero-skeleton__title {
  
  width: 70%;
  
  height: var(--space-7);
  
  border-radius: var(--radius-sm);
  
  margin-bottom: var(--space-4);
  
}

.hero-skeleton__text {
  
  width: 90%;
  
  height: var(--space-4);
  
  border-radius: var(--radius-sm);
  
}

/* ========================================
   MOBILE
======================================== */

@media(max-width:768px) {
  
  .hero-skeleton__image {
    
    aspect-ratio: 4/5;
    
  }
  
  .hero-skeleton__content {
    
    left: var(--space-4);
    
    right: var(--space-4);
    
    bottom: var(--space-4);
    
    width: auto;
    
  }
  
  .hero-skeleton__title {
    
    width: 90%;
    
  }
  
}
/* ========================================
   PLP TYPE A SKELETON
======================================== */

.plp-category-skeleton {
  
  margin-block: var(--space-6);
  
}

/* ========================================
   HERO
======================================== */

.plp-category-skeleton__hero {
  
  width: 100%;
  
  height: 320px;
  
  border-radius: var(--radius-lg);
  
  margin-bottom: var(--space-8);
  
}

/* ========================================
   GRID
======================================== */

.plp-category-skeleton__grid {
  
  display: grid;
  
  grid-template-columns: repeat(4, 1fr);
  
  gap: var(--space-5);
  
}

/* ========================================
   CARD
======================================== */

.category-skeleton-card {
  
  background: var(--color-surface);
  
  border-radius: var(--radius-sm);
  
  overflow: hidden;
  
  box-shadow: var(--shadow-sm);
  
}

.category-skeleton-card__image {
  
  width: 100%;
  
  aspect-ratio: 1 / 1;
  
}

.category-skeleton-card__content {
  
  padding: var(--space-4);
  
}

.category-skeleton-card__title {
  
  width: 70%;
  
  height: var(--space-6);
  
  border-radius: var(--radius-sm);
  
  margin-bottom: var(--space-3);
  
}

.category-skeleton-card__count {
  
  width: 40%;
  
  height: var(--space-4);
  
  border-radius: var(--radius-sm);
  
}

/* ========================================
   TABLET
======================================== */

@media(max-width:1024px) {
  
  .plp-category-skeleton__grid {
    
    grid-template-columns: repeat(3, 1fr);
    
  }
  
}

/* ========================================
   MOBILE
======================================== */

@media(max-width:768px) {
  
  .plp-category-skeleton__hero {
    
    height: 220px;
    
  }
  
  .plp-category-skeleton__grid {
    
    grid-template-columns: repeat(2, 1fr);
    
  }
  
}
/* ========================================
   PRODUCT CARD SKELETON
======================================== */

.product-card-skeleton{

  width:100%;

  background:var(--color-surface);

  border-radius:var(--radius-md);

  overflow:hidden;

  box-shadow:var(--shadow-md);

}

.product-card-skeleton__media{

  position:relative;

  aspect-ratio:4 / 5;

}

.product-card-skeleton__content{

  padding:var(--space-4);

}

/* ========================================
   BADGE
======================================== */

.skeleton-badge{

  position:absolute;

  top:var(--space-3);

  left:var(--space-3);

  width:76px;

  height:38px;

  border-radius:var(--pill-radius);

  z-index:2;

}

/* ========================================
   FLOATING CART
======================================== */

.skeleton-cart{

  position:absolute;

  top:var(--space-3);

  right:var(--space-3);

  width:48px;

  height:48px;

  border-radius:50%;

  z-index:2;

}

/* ========================================
   IMAGE
======================================== */

.skeleton-media{

  width:100%;

  height:100%;

}

/* ========================================
   TITLE
======================================== */

.skeleton-title{

  height:var(--space-5);

  width:80%;

  border-radius:var(--radius-sm);

  margin-bottom:var(--space-4);

}

/* ========================================
   PRICE
======================================== */

.skeleton-price-row{

  display:flex;

  align-items:center;

  gap:var(--space-3);

  margin-bottom:var(--space-4);

}

.skeleton-old-price{

  width:48px;

  height:var(--space-4);

  border-radius:var(--radius-sm);

}

.skeleton-new-price{

  width:72px;

  height:var(--space-5);

  border-radius:var(--radius-sm);

}

/* ========================================
   LINK
======================================== */

.skeleton-link{

  width:120px;

  height:var(--space-4);

  border-radius:var(--radius-sm);

  margin-left:auto;

}

/* ========================================
   SHOWCASE GRID
======================================== */

.skeleton-grid{

  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:var(--space-5);

}

@media(max-width:1024px){

  .skeleton-grid{

    grid-template-columns:
      repeat(3,1fr);

  }

}

@media(max-width:768px){

  .skeleton-grid{

    grid-template-columns:
      repeat(2,1fr);

  }

}



/* ========================================
   PDP SKELETON
======================================== */

.pdp-skeleton{

  margin-top:var(--space-6);

  margin-bottom:var(--space-8);

}

/* ========================================
   TOP SECTION
======================================== */

.pdp-skeleton-media-wrapper{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:var(--space-7);

  align-items:start;

  margin-bottom:var(--space-8);

}

/* ========================================
   MEDIA
======================================== */

.pdp-skeleton__media{

  display:grid;

  grid-template-columns:
    var(--thumbnail-width)
    1fr;

  gap:var(--space-4);

}

.pdp-skeleton__thumbnails{

  display:flex;

  flex-direction:column;

  gap:var(--space-2);

}

.skeleton-thumb{

  width:var(--thumbnail-width);

  height:var(--thumbnail-height);

  border-radius:var(--radius-md);

}

.skeleton-main-image{

  width:100%;

  aspect-ratio:var(--product-media-ratio);

  border-radius:var(--radius-md);

}

/* ========================================
   CONTENT
======================================== */

.pdp-skeleton__content{

  width:100%;

}

.skeleton-collection{

  width:120px;

  height:var(--space-4);

  border-radius:var(--radius-sm);

  margin-bottom:var(--space-3);

}

.skeleton-product-title{

  width:70%;

  height:var(--space-6);

  border-radius:var(--radius-sm);

  margin-bottom:var(--space-4);

}

.skeleton-text{

  width:100%;

  height:var(--space-3);

  border-radius:var(--radius-sm);

  margin-bottom:var(--space-2);

}

.skeleton-text.short{

  width:80%;

}

.skeleton-price{

  width:140px;

  height:var(--space-6);

  border-radius:var(--radius-sm);

  margin-top:var(--space-4);

  margin-bottom:var(--space-4);

}

.skeleton-cart-button{

  width:100%;

  height:var(--button-height);

  border-radius:var(--radius-md);

}

/* ========================================
   DESCRIPTION
======================================== */

.pdp-description-skeleton{

  margin-bottom:var(--space-8);

}

.skeleton-section-title{

  width:180px;

  height:var(--space-6);

  border-radius:var(--radius-sm);

  margin-bottom:var(--space-5);

}

.skeleton-paragraph{

  width:100%;

  height:var(--space-3);

  border-radius:var(--radius-sm);

  margin-bottom:var(--space-3);

}

.skeleton-paragraph.short{

  width:75%;

}

/* ========================================
   SPECIFICATIONS
======================================== */

.skeleton-spec-row{

  width:100%;

  height:48px;

  border-radius:var(--radius-sm);

  margin-bottom:var(--space-2);

}

/* ========================================
   MOBILE
======================================== */

@media(max-width:768px){

  .pdp-skeleton-media-wrapper{

    grid-template-columns:1fr;

  }

  .pdp-skeleton__media{

    display:flex;

    flex-direction:column;

    gap:var(--space-3);

  }

  .pdp-skeleton__thumbnails{

    flex-direction:row;

  }

}

/* ========================================
   CART SKELETON
======================================== */

.cart-skeleton {
  
  display: flex;
  
  flex-direction: column;
  
  gap: var(--space-5);
  
}

/* ========================================
   ITEM
======================================== */

.cart-skeleton__item {
  
  display: flex;
  
  gap: var(--space-3);
  
  padding-bottom: var(--space-4);
  
  border-bottom: 1px solid var(--color-border);
  
}

/* ========================================
   RTL SUPPORT
======================================== */

[dir="rtl"] .cart-skeleton__item {
  
  flex-direction: row-reverse;
  
}

[dir="ltr"] .cart-skeleton__item {
  
  flex-direction: row;
  
}

/* ========================================
   IMAGE
======================================== */

.cart-skeleton__image {
  
  width: var(--thumbnail-width);
  
  height: var(--thumbnail-height);
  
  flex-shrink: 0;
  
  border-radius: var(--radius-md);
  
}

/* ========================================
   CONTENT
======================================== */

.cart-skeleton__content {
  
  flex: 1;
  
}

.cart-skeleton__category {
  
  width: 30%;
  
  height: var(--space-3);
  
  border-radius: var(--radius-sm);
  
  margin-bottom: var(--space-2);
  
}

.cart-skeleton__title {
  
  width: 75%;
  
  height: var(--space-5);
  
  border-radius: var(--radius-sm);
  
  margin-bottom: var(--space-3);
  
}

.cart-skeleton__price {
  
  width: 25%;
  
  height: var(--space-4);
  
  border-radius: var(--radius-sm);
  
}

/* ========================================
   SUMMARY
======================================== */

.cart-skeleton__summary {
  
  padding-top: var(--space-4);
  
}

.cart-skeleton__subtotal {
  
  width: 40%;
  
  height: var(--space-5);
  
  border-radius: var(--radius-sm);
  
  margin-bottom: var(--space-4);
  
}

.cart-skeleton__button {
  
  width: 100%;
  
  height: var(--button-height);
  
  border-radius: var(--radius-md);
  
}

/* ========================================
   MOBILE
======================================== */

@media(max-width:768px) {
  
  .cart-skeleton__image {
    
    width: 72px;
    
    height: 90px;
    
  }
  
  .cart-skeleton__title {
    
    width: 90%;
    
  }
  
  .cart-skeleton__price {
    
    width: 35%;
    
  }
  
  .cart-skeleton__subtotal {
    
    width: 60%;
    
  }
  
}
  </style>
</head>
