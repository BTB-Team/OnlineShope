<style type="text/css" media="all">
/* ========================================   EMPTY PLP======================================== */
.empty-plp{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:
    var(--space-9)
    var(--space-5);
  min-height:420px;
}
/* ==============    ICON ============== */
.empty-plp__icon{
  font-size:72px;
  margin-bottom:var(--space-5);
  opacity:.8;
}
/*  ==============   TITLE ============== */
.empty-plp__title{
  font-size:var(--font-size-h3);
  color:var(--color-text-primary);
  margin-bottom:var(--space-3);
  font-family: var(--font-heading-en);
}
/*  ==============  DESCRIPTION ============= */
.empty-plp__text{
  max-width:500px;
  color:var(--color-text-secondary);
  line-height:1.7;
  margin-bottom:var(--space-6);
}
/*  ==============   ACTIONS ============== */
.empty-plp__actions{
  display:flex;
  gap:var(--space-3);
  flex-wrap:wrap;
  justify-content:center;
}
/*  ==============   MOBILE ============== */
@media(max-width:768px){
  .empty-plp{
    min-height:320px;
    padding:
      var(--space-7)
      var(--space-4);
  }
  .empty-plp__icon{
    font-size:56px;
  }
  .empty-plp__actions{
    width:100%;
    flex-direction:column;
  }
}
</style>
