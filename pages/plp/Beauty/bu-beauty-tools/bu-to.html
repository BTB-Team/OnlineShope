<!DOCTYPE html>

    <link rel="stylesheet" href="./../../../../src/css/style.css">

<body>
    <section class="ui-section">

    <!-- Breadcrumb -->

      <a href="../index.html">Home</a>
      <span>/</span>
      <a href="#">Women</a>
      <span>/</span>
      <span>Beauty</span>
    </nav>
    

<!-- Hero section -->
<section class="plp-hero">

      <div class="plp-hero__content">
        <h1 class="plp-hero__title">Women Beauty</h1>
        <p class="plp-hero__description">
          Skincare • Makeup • Hair Care Essentials
        </p>
        </div>

      <div class="plp-hero__media">

      </div>

    </section>

        <path d="M10 18a8 8 0 1 1 5.292-14.002A8 8 0 0 1 10 18zm11 3-6-6"
          fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round"/>

      <input class="search-box__input" placeholder="Search beauty products...">
      </div>

      <!-- Category Grid -->
       <div class="plp-category-grid">

      <a href="#" class="plp-category-card">
        <img src="https://i.pinimg.com/736x/83/dc/5f/83dc5fab85eaa32540e5188f1806f6a5.jpg" alt ="makeup picture" loading="lazy">

          <h3>Skincare</h3>

        </div>

      <a href="#" class="plp-category-card">
        <img src="https://i.pinimg.com/736x/38/13/61/38136126a47b55029e61c6c9cffa17fe.jpg" alt="makeup" loading="lazy">

          <h3>Makeup</h3>

        <div class="plp-category-card__body">
          <h3>Hair Care</h3>
          <span>12 Products</span>
        </div>
      </a>

      <a href="#" class="plp-category-card">
        <img src="https://i.pinimg.com/736x/92/18/d9/9218d9cc5cdec593a150b1a9c05fce6b.jpg" alt="Body Care" loading="lazy">
