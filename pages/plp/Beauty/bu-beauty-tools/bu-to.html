<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beauty Tools</title>

    <link rel="stylesheet" href="./../../../../src/css/style.css">

    <link rel="stylesheet" href="./../../../../src/css/pages/plp-collection.css">

</head>


<body>


<section class="ui-section">

<div class="container">


    <!-- Breadcrumb -->

    <nav class="breadcrumb">

        <a href="../index.html">
            Home
        </a>

        <span>/</span>

        <a href="#">
            Women
        </a>

        <span>/</span>

        <span>
            Beauty Tools
        </span>

    </nav>



    <!-- Hero Section -->

    <section class="plp-hero">


        <div class="plp-hero__content">


            <h1 class="plp-hero__title">
                Women Beauty Tools
            </h1>


            <p class="plp-hero__description">
                Professional tools for makeup, hair styling,
                skincare routines and nail care.
            </p>


        </div>



        <div class="plp-hero__media">


            <img
            src="https://i.pinimg.com/736x/d9/b6/68/d9b66800153a0e37c08622b89c5e8475.jpg"
            alt="Beauty tools"
            loading="lazy">


        </div>


    </section>




    <!-- Search -->

    <div class="search-box">


        <svg 
        class="search-box__icon" 
        viewBox="0 0 24 24"
        aria-hidden="true">


            <path 
            d="M10 18a8 8 0 1 1 5.292-14.002A8 8 0 0 1 10 18zm11 3-6-6"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>


        </svg>



        <input

        class="search-box__input"

        type="search"

        placeholder="Search beauty tools...">


    </div>





    <!-- Category Grid -->


    <div class="plp-category-grid">



        <!-- Category 1 -->

        <a href="#" class="plp-category-card">


            <img

            src="https://i.pinimg.com/736x/79/b4/eb/79b4eb2274f1ff62d4b6efea12a38d6f.jpg"

            alt="Makeup brushes and applicators"

            loading="lazy">


            <div class="plp-category-card__body">


                <h3>
                    Brushes & Applicators
                </h3>


                <span>
                    24 Products
                </span>


            </div>


        </a>





        <!-- Category 2 -->


        <a href="#" class="plp-category-card">


            <img

            src="https://i.pinimg.com/736x/1a/80/58/1a8058de963b8c5850db78d2f923c265.jpg"

            alt="Hair styling tools"

            loading="lazy">


            <div class="plp-category-card__body">


                <h3>
                    Hair Styling Tools
                </h3>


                <span>
                    18 Products
                </span>


            </div>


        </a>





        <!-- Category 3 -->


        <a href="#" class="plp-category-card">


            <img

            src="https://i.pinimg.com/1200x/d9/d4/b4/d9d4b48aa8b6396ee32e40ce64ffdf20.jpg"

            alt="Facial beauty tools"

            loading="lazy">


            <div class="plp-category-card__body">


                <h3>
                    Facial Tools
                </h3>


                <span>
                    12 Products
                </span>


            </div>


        </a>





        <!-- Category 4 -->


        <a href="#" class="plp-category-card">


            <img

            src="https://i.pinimg.com/736x/52/24/ff/5224ff378cc98d8039407341eddf2f33.jpg"

            alt="Nail care tools"

            loading="lazy">


            <div class="plp-category-card__body">


                <h3>
                    Nail Care Tools
                </h3>


                <span>
                    31 Products
                </span>


            </div>


        </a>



    </div>



</div>
