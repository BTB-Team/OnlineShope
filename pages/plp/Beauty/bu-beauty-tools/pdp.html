<!DOCTYPE html>

<html lang="en">


<head>

<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Product Details</title>


<link rel="stylesheet" href="./../../src/css/style.css">

<link rel="stylesheet" href="./../../src/css/pages/pdp.css">


</head>



<body>



<section class="ui-section">


<div class="container">



<nav class="breadcrumb">

<a href="#">
Home
</a>

<span>/</span>

<a href="#">
Beauty
</a>

<span>/</span>

<span id="breadcrumbTitle">
Product
</span>


</nav>






<section class="pdp">



<!-- MEDIA -->

<div class="pdp-media">


<div class="pdp-thumbnails" id="pdpThumbnails">

</div>



<div class="pdp-main-media">


<img

id="pdpMainImage"

alt="">



</div>


</div>





<!-- INFORMATION -->

<div class="pdp-info">



<span class="pdp-category" id="pdpCategory">

</span>



<h1 class="pdp-title" id="pdpTitle">

</h1>




<div class="pdp-price">


<span class="pdp-old-price number" id="pdpOldPrice">

</span>


<span class="pdp-current-price number" id="pdpPrice">

</span>



</div>





<p class="pdp-subtitle" id="pdpDescription">

</p>




<button class="btn btn-primary">

Add To Cart

</button>




</div>



</section>







<section class="pdp-description">


<h2>

Description

</h2>


<p id="description">

</p>


</section>





<section class="pdp-specs">


<h2>

Specifications

</h2>



<table>

<tbody id="specifications">

</tbody>


</table>


</section>




</div>

</section>



<script type="module" src="product-previes.js"></script>
</body>


</html>
