<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Women Bags & Shoes</title>

    <link rel="stylesheet" href="../../../../../src/css/style.css" />
    <link rel="stylesheet" href="../../../../../src/css/pages/plp-collection.css">

    <link
      rel="stylesheet"
      href="./../../../../src/css/pages/plp-collection.css"
    />
  </head>

  <body>
    <section class="ui-section">
      <div class="container">
        <!-- Breadcrumb -->

        <nav class="breadcrumb">
          <a href="#" id="homeText">
            Home
          </a>

          <span>/</span>

          <a href="#" id="womenText">
            Women
          </a>

          <span>/</span>

          <span id="breadcrumbTitle">
            Bags & Shoes
          </span>
        </nav>

        <!-- Header Actions -->

        <div class="language-switcher">
          <button id="languageButton" class="language-switcher__button">
            EN
          </button>
        </div>

        <!-- Hero -->

        <section class="plp-hero">
          <div class="plp-hero__content">
            <h1 class="plp-hero__title" id="pageTitle">
              Women Bags & Shoes
            </h1>

            <p class="plp-hero__description" id="pageDescription">
              Explore our collection of women's bags and shoes, featuring
              stylish handbags, comfortable sneakers, elegant heels, boots,
              sandals, and everyday essentials for every occasion.
            </p>
          </div>

          <div class="plp-hero__media">
            <img
              id="heroImage"
              src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=1200&auto=format&fit=crop&q=80"
              alt="Women Bags and Shoes"
              loading="lazy"
            />
          </div>
        </section>

        <!-- Search -->

        <div class="search-box">
          <svg class="search-box__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M10 18a8 8 0 1 1 5.292-14.002A8 8 0 0 1 10 18zm11 3-6-6"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>

          <input
            id="searchInput"
            class="search-box__input"
            type="search"
            placeholder="Search Bags & Shoes..."
          />
        </div>

        <!-- Categories -->

        <div class="plp-category-grid" id="categoryGrid"></div>
      </div>
    </section>

    <script type="module" src="w-bag-shoes-col-preview.js"></script>
  </body>
</html>
